<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioAuth Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060a14;
      --bg2: #0c1322;
      --bg3: #111827;
      --bg4: #1a2332;
      --border: #1e2d3d;
      --border2: #263445;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #475569;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --purple: #8b5cf6;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .nav-subtitle {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }

    .nav-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--mono);
      font-weight: 500;
    }

    .nav-badge.active {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: var(--green);
    }

    .nav-badge.inactive {
      background: rgba(71,85,105,0.2);
      border: 1px solid var(--border2);
      color: var(--text3);
    }

    /* ── Layout ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 32px;
    }

    /* ── Metrics Row ── */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .metric-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 14px 14px 0 0;
    }

    .metric-card.blue::before { background: linear-gradient(90deg, var(--accent2), var(--accent)); }
    .metric-card.green::before { background: linear-gradient(90deg, #059669, var(--green)); }
    .metric-card.yellow::before { background: linear-gradient(90deg, #d97706, var(--yellow)); }
    .metric-card.purple::before { background: linear-gradient(90deg, #7c3aed, var(--purple)); }

    .metric-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: var(--mono);
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }

    .metric-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 6px;
    }

    /* ── Two Col Layout ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    /* ── Cards ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg { width: 16px; height: 16px; color: var(--text3); }

    .card-subtitle {
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 18px;
    }

    /* ── Score Gauge ── */
    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
    }

    .gauge-svg { width: 200px; height: 110px; }

    .gauge-value {
      font-size: 42px;
      font-weight: 700;
      font-family: var(--mono);
      margin-top: -10px;
      text-align: center;
    }

    .gauge-label {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      font-family: var(--mono);
    }

    /* ── Profile Stats ── */
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-row-label { font-size: 13px; color: var(--text2); }
    .stat-row-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: var(--mono);
    }
    .stat-row-unit { font-size: 11px; color: var(--text3); margin-left: 3px; }

    /* ── Event Log ── */
    .event-table {
      width: 100%;
      border-collapse: collapse;
    }

    .event-table th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text3);
      font-family: var(--mono);
      padding: 0 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border2);
    }

    .event-table td {
      padding: 10px 12px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .event-table tr:last-child td { border-bottom: none; }

    .event-table tr:hover td { background: rgba(255,255,255,0.02); }

    .score-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
    }

    .score-pill.pass { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
    .score-pill.warn { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
    .score-pill.fail { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    /* ── Chart ── */
    .chart-wrap {
      height: 160px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 0 4px;
    }

    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }

    .chart-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height 0.5s ease;
      cursor: pointer;
    }

    .chart-bar-label {
      font-size: 9px;
      color: var(--text3);
      font-family: var(--mono);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      height: 30px;
      overflow: hidden;
    }

    /* ── Live Monitor ── */
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--green);
      font-family: var(--mono);
      margin-left: 8px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: livePulse 1.5s infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Enrollment Flow ── */
    .enroll-steps {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .enroll-step {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      position: relative;
    }

    .enroll-step.done {
      border-color: rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.05);
    }

    .enroll-step.active {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.05);
    }

    .step-num {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text3);
      margin-bottom: 6px;
    }

    .step-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
    }

    .step-icon { font-size: 20px; margin-bottom: 6px; display: block; }

    /* ── Alert Box ── */
    .alert-box {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .alert-box.info {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
    }

    .alert-box.success {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
    }

    .alert-box.warn {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
    }

    .alert-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .alert-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }

    /* ── Btn ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 9px;
      border: none;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #0a1626;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-ghost {
      background: var(--bg4);
      color: var(--text2);
      border: 1px solid var(--border2);
    }

    .btn-ghost:hover { background: var(--border2); color: var(--text); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-danger:hover { background: rgba(239,68,68,0.15); }

    /* ── Section divider ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .metrics-row { grid-template-columns: 1fr 1fr; }
      .two-col, .three-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 500px) {
      .metrics-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="white"/>
        <path d="M4 20c0-4.42 3.58-8 8-8s8 3.58 8 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="8" r="1.5" fill="rgba(0,0,0,0.4)"/>
      </svg>
    </div>
    <div>
      <div class="nav-title">BioAuth</div>
      <div class="nav-subtitle">Behavioral Biometrics</div>
    </div>
  </div>
  <span class="nav-badge inactive" id="navBadge">Loading...</span>
</nav>

<!-- Main -->
<div class="main">
  <div id="dashContent">
    <div style="text-align:center; padding: 64px; color: #475569;">Loading dashboard...</div>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
