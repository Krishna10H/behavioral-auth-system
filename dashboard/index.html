<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<h3>Saved Pattern</h3>
<pre id="pattern"></pre>

<h3>Login Logs</h3>
<div id="logs"></div>

<script>
let pattern = JSON.parse(localStorage.getItem("userPattern"));
document.getElementById("pattern").innerText = JSON.stringify(pattern, null, 2);

let logs = JSON.parse(localStorage.getItem("loginLogs")) || [];
let div = document.getElementById("logs");

logs.forEach((log, i) => {
  div.innerHTML += `<p>${i+1}. ${log.avg} ms → ${log.result}</p>`;
});
</script>

</body>
</html>
