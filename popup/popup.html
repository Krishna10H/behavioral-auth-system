<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BioAuth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d18;
      --bg2: #0f172a;
      --bg3: #1e293b;
      --border: #1e293b;
      --border2: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #475569;
      --accent: #38bdf8;
      --accent2: #0ea5e9;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 400px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #0f172a, #080d18);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(56,189,248,0.08), transparent 70%);
      border-radius: 50%;
    }

    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(56,189,248,0.3);
    }

    .logo svg { width: 22px; height: 22px; }

    .header-text h1 {
      font-size: 17px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
      font-weight: 400;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text3);
      margin-left: auto;
      flex-shrink: 0;
      position: relative;
    }

    .status-dot.active {
      background: var(--green);
      box-shadow: 0 0 8px rgba(16,185,129,0.6);
    }

    .status-dot.active::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: rgba(16,185,129,0.2);
      animation: pulse 2s infinite;
    }

    .status-dot.warning {
      background: var(--yellow);
      box-shadow: 0 0 8px rgba(245,158,11,0.6);
    }

    .status-dot.error {
      background: var(--red);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.4; }
    }

    /* ── Main Content ── */
    .content { padding: 16px 20px; }

    /* ── State Cards ── */
    .state-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      transition: border-color 0.3s;
    }

    .state-card.enrolled {
      border-color: rgba(16,185,129,0.3);
      background: linear-gradient(135deg, #064e3b10, #0f172a);
    }

    .state-card.enrolling {
      border-color: rgba(56,189,248,0.3);
      background: linear-gradient(135deg, #0c4a6e10, #0f172a);
    }

    .state-card.warning {
      border-color: rgba(245,158,11,0.4);
      background: linear-gradient(135deg, #78350f10, #0f172a);
    }

    .state-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .state-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .state-icon.green { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
    .state-icon.blue { background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.3); }
    .state-icon.yellow { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
    .state-icon.gray { background: rgba(71,85,105,0.2); border: 1px solid var(--border2); }

    .state-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .state-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
    }

    /* ── Score Meter ── */
    .score-meter {
      margin-top: 14px;
    }

    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score-label {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-value {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .score-bar {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease, background 0.3s;
    }

    /* ── Progress Bar ── */
    .progress-wrap {
      margin-top: 14px;
    }

    .progress-bar {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    .progress-label {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-cell {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .stat-cell-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--mono);
      margin-bottom: 4px;
    }

    .stat-cell-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--mono);
    }

    .stat-cell-unit {
      font-size: 10px;
      color: var(--text3);
      margin-left: 2px;
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #0f172a;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border2);
    }

    .btn-secondary:hover { background: #263245; color: var(--text); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-danger:hover { background: rgba(239,68,68,0.15); }

    .btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-link {
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      font-family: var(--mono);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-link:hover { color: var(--accent); }

    .version-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      background: var(--bg3);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 14px;
    }

    /* ── Section Label ── */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text3);
      font-family: var(--mono);
      margin-bottom: 10px;
    }

    /* ── Alerts ── */
    .alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .alert-info {
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.2);
      color: #7dd3fc;
    }

    .alert svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

    /* ── Tab Bar ── */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--bg2);
      padding: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 7px;
      border-radius: 7px;
      border: none;
      background: none;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .tab.active {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Settings ── */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-row:last-child { border-bottom: none; }

    .setting-label {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }

    .setting-desc {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .setting-input {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 8px;
      width: 70px;
      text-align: right;
    }

    .setting-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ── Recent Events ── */
    .event-list { max-height: 160px; overflow-y: auto; }

    .event-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .event-item:last-child { border-bottom: none; }

    .event-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .event-text { color: var(--text2); flex: 1; }
    .event-score { color: var(--text3); font-family: var(--mono); }
    .event-time { color: var(--text3); font-family: var(--mono); }

    /* Hidden state */
    .hidden { display: none !important; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      color: var(--text3);
      font-size: 13px;
      gap: 10px;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="8" r="4" fill="white"/>
      <path d="M4 20c0-4.42 3.58-8 8-8s8 3.58 8 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="8" r="1.5" fill="rgba(0,0,0,0.4)"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>BioAuth</h1>
    <p>Behavioral Biometrics</p>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- Main Content -->
<div class="content" id="mainContent">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    Loading...
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <a class="footer-link" id="dashboardLink">📊 Dashboard</a>
  <span class="version-badge">v1.0.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
